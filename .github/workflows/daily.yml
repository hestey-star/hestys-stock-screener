name: Dagelijkse screener

on:
  schedule:
    # Maandag t/m vrijdag, 23:00 UTC = 00:00/01:00 CET/CEST -- ruim na
    # sluiting van alle Europese en Amerikaanse beurzen die dag
    - cron: "0 23 * * 1-5"
  workflow_dispatch:  # laat je dit ook handmatig starten via de GitHub-website, handig om te testen

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Dagelijkse screener + opt-in-mails draaien
        run: python daily_batch.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EMAIL_SMTP_SERVER: smtp.gmail.com
          EMAIL_SMTP_PORT: 587
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}

      - name: Bijgewerkte bestanden committen en pushen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supertrend_signals_daily.csv top_movers.csv
          git diff --staged --quiet || git commit -m "Automatische dagelijkse update"
          git push
