name: Dagelijkse screener

on:
  schedule:
    # Maandag t/m vrijdag. LET OP: de tijden staan BEWUST niet op :00/:30 --
    # GitHub's eigen documentatie waarschuwt dat het hele uur (:00) het
    # drukste moment is op heel GitHub Actions (gedeeld door alle repo's
    # tegelijk), en dat geplande runs daardoor vertraagd of zelfs
    # overgeslagen kunnen worden. Een paar minuten ernaast (bv. :07 i.p.v.
    # :00) verkleint die kans aanzienlijk.
    #
    # 05:07 UTC = scan draaien + direct mail naar EU-gebruikers
    #             (~06:07 CET winter / ~07:07 CEST zomer)
    # 05:37 UTC = VANGNET -- als GitHub's planner de 05:07-tick een keer
    #             mist (komt voor, 'best effort'-planning), proberen we
    #             het hier nog een keer. Slaat zichzelf over als de
    #             05:07-run al gelukt is (voorkomt een dubbele mail).
    # 12:07 UTC = alleen mail naar VS-oost-gebruikers (~07:07-08:07 ET)
    # 15:07 UTC = alleen mail naar VS-west-gebruikers (~07:07-08:07 PT)
    - cron: "7 5 * * 1-5"
    - cron: "37 5 * * 1-5"
    - cron: "7 12 * * 1-5"
    - cron: "7 15 * * 1-5"
  workflow_dispatch:
    inputs:
      region:
        description: "Regio voor een handmatige test-run"
        required: false
        default: "EU"
        type: choice
        options:
          - EU
          - US_East
          - US_West

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # volledige geschiedenis nodig om de laatste commit-datum van de CSV te checken

      - name: Diagnose -- welke trigger vuurde, en hoe laat kwam de run daadwerkelijk binnen
        run: |
          echo "Trigger event: ${{ github.event_name }}"
          echo "Schedule-expressie (indien van toepassing): ${{ github.event.schedule }}"
          echo "Werkelijke starttijd (UTC): $(date -u)"

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Regio bepalen en of de scan/mail vandaag al gelukt is
        id: determine
        run: |
          if [ "${{ github.event.schedule }}" = "7 5 * * 1-5" ] || [ "${{ github.event.schedule }}" = "37 5 * * 1-5" ]; then
            echo "region=EU" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 12 * * 1-5" ]; then
            echo "region=US_East" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "7 15 * * 1-5" ]; then
            echo "region=US_West" >> "$GITHUB_OUTPUT"
          else
            echo "region=${{ github.event.inputs.region }}" >> "$GITHUB_OUTPUT"
          fi

          # Vangnet-check: is de EU-scan van VANDAAG al gecommit? Zo ja, dan
          # is de 05:07-run (of een eerdere vangnet-poging) al gelukt, en
          # slaan we een 2e scan/mail voor vandaag over (voorkomt dubbele mail).
          LAST_COMMIT_DATE=$(git log -1 --format=%cd --date=format:%Y-%m-%d -- supertrend_signals_daily.csv 2>/dev/null || echo "never")
          TODAY=$(date -u +%Y-%m-%d)
          if [ "$LAST_COMMIT_DATE" = "$TODAY" ]; then
            echo "eu_already_done_today=true" >> "$GITHUB_OUTPUT"
          else
            echo "eu_already_done_today=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dagelijkse scan draaien (EU, alleen als dat vandaag nog niet gelukt is)
        if: steps.determine.outputs.region == 'EU' && steps.determine.outputs.eu_already_done_today == 'false'
        run: python daily_batch.py
        env:
          EMAIL_SMTP_SERVER: smtp.gmail.com
          EMAIL_SMTP_PORT: 587
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}

      - name: Mail versturen voor deze regio
        if: steps.determine.outputs.region != 'EU' || steps.determine.outputs.eu_already_done_today == 'false'
        run: python daily_email_dispatch.py ${{ steps.determine.outputs.region }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EMAIL_SMTP_SERVER: smtp.gmail.com
          EMAIL_SMTP_PORT: 587
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}

      - name: Bijgewerkte bestanden committen en pushen (alleen na een EU-scan)
        if: steps.determine.outputs.region == 'EU' && steps.determine.outputs.eu_already_done_today == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add supertrend_signals_daily.csv top_movers.csv
          git diff --staged --quiet || git commit -m "Automatische dagelijkse update"
          git pull --rebase origin main
          git push
